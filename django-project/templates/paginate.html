<nav class="pagination-container">
    <ul class="pagination">
        <li class="page-item {% if not page.has_previous %}disabled{% endif %}">
            <a href="{{ request.path }}?page=1" class="page-link">« Первая</a>
        </li>

        {% if page.has_previous %}
            <li class="page-item">
                <a href="{{ request.path }}?page={{ page.previous_page_number }}" class="page-link">
                    {{ page.previous_page_number }}
                </a>
            </li>
        {% endif %}

        <li class="page-item active">
            <span class="page-link">{{ page.number }}</span>
        </li>

        {% if page.has_next %}
            <li class="page-item">
                <a href="{{ request.path }}?page={{ page.next_page_number }}" class="page-link">
                    {{ page.next_page_number }}
                </a>
            </li>
        {% endif %}

        <li class="page-item {% if not page.has_next %}disabled{% endif %}">
            <a href="{{ request.path }}?page={{ page.paginator.num_pages }}" class="page-link">Последняя »</a>
        </li>
    </ul>
</nav>
